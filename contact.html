<h3>Order Form</h3>
<form onsubmit="handleOrder(event)">
  <input type="text" id="name" placeholder="Your Name" required><br>
  <input type="text" id="product" placeholder="Product Name" required><br>
  <textarea id="address" placeholder="Address" required></textarea><br>
  <button type="submit">Order Now</button>
</form><p id="successMsg"></p><br><button onclick="sendWhatsApp()">📱 Order via WhatsApp</button>

<script>
function handleOrder(event) {
  event.preventDefault();

  let name = document.getElementById("name").value;
  let product = document.getElementById("product").value;
  let address = document.getElementById("address").value;

  // Save data in browser (localStorage)
  localStorage.setItem("customerName", name);
  localStorage.setItem("productName", product);
  localStorage.setItem("address", address);

  // Show success message
  document.getElementById("successMsg").innerHTML =
    "✅ Order Placed Successfully!";

  // Clear form
  event.target.reset();
}

function sendWhatsApp() {
  let name = localStorage.getItem("customerName");
  let product = localStorage.getItem("productName");
  let address = localStorage.getItem("address");

  let message = "Order Details:%0AName: " + name +
                "%0AProduct: " + product +
                "%0AAddress: " + address;

  let phone = " 918010745035"; // 👉 इथे तुझा नंबर टाक

  window.open("https://wa.me/" + phone + "?text=" + message);
}
</script></body>
